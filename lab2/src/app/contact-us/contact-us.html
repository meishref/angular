<div class="container mt-5">

  <div class="text-center mb-5">
    <h1 class="fw-bold">Contact Us</h1>
    <p class="text-muted">We’d love to hear from you</p>
  </div>

  <div class="row">

    <!-- Form -->
    <div class="col-md-6">
      <form>

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" placeholder="Your name">
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="Your email">
        </div>

        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="4" placeholder="Your message"></textarea>
        </div>

        <button class="btn btn-warning w-100">Send Message</button>

      </form>
    </div>

    <!-- Info -->
    <div class="col-md-6">
      <h5 class="fw-bold">Contact Info</h5>
      <p class="text-muted">📍 Cairo, Egypt</p>
      <p class="text-muted">📞 +20 123 456 789</p>
      <p class="text-muted">📧 info@mycourses.com</p>
    </div>

  </div>

</div>
