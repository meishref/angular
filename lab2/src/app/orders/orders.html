<div mg-b-5 class="container mt-5">

  <h3 class="fw-bold mb-4">Our Courses</h3>

  <div class="row">
<select class="form-select w-25 mb-4" [(ngModel)]="selectedCategory">

  @for (cat of categories; track cat) {
    <option [value]="cat === 'All' ? '' : cat">
      {{ cat }}
    </option>
  }

</select>

<app-card [selectedCategory]="selectedCategory"></app-card>
</div>
